name: "Terraform CD (Apply)"

on:
  push:
    branches:
      - main
    paths:
      - 'envs/**'
      - 'modules/**'

permissions:
  id-token: write
  contents: read

env:
  TF_VERSION: "1.5.7"

# mainブランチでの同時Applyを防ぐ
concurrency:
  group: terraform-cd
  cancel-in-progress: false

jobs:
  apply-dev:
    name: "Apply Dev"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: envs/dev
    steps:
      - uses: actions/checkout@v4
      
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          # ★TODO: Account ID を実際のものに書き換えてください
          role-to-assume: arn:aws:iam::<ACCOUNT_ID>:role/gh-terraform-apply-dev
          aws-region: ap-northeast-1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          
      - name: Terraform Init
        run: terraform init
        
      - name: Terraform Apply
        run: terraform apply -auto-approve

  plan-prod:
    name: "Plan Prod"
    runs-on: ubuntu-latest
    needs: apply-dev # dev完了後に実行
    defaults:
      run:
        working-directory: envs/prod
    steps:
      - uses: actions/checkout@v4
      
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          # ★TODO: Account ID を実際のものに書き換えてください
          role-to-assume: arn:aws:iam::<ACCOUNT_ID>:role/gh-terraform-plan-prod
          aws-region: ap-northeast-1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          
      - name: Terraform Init
        run: terraform init
        
      - name: Terraform Plan
        id: plan
        run: terraform plan -out=tfplan -no-color

      - name: Show Plan in Summary
        run: terraform show -no-color tfplan >> $GITHUB_STEP_SUMMARY

      - name: Upload Plan Artifact
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-prod
          path: envs/prod/tfplan
          retention-days: 1

  apply-prod:
    name: "Apply Prod"
    needs: plan-prod
    runs-on: ubuntu-latest
    environment: production # ★ここで承認ゲートを利用
    defaults:
      run:
        working-directory: envs/prod
    steps:
      - uses: actions/checkout@v4
      
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          # ★TODO: Account ID を実際のものに書き換えてください
          role-to-assume: arn:aws:iam::<ACCOUNT_ID>:role/gh-terraform-apply-prod
          aws-region: ap-northeast-1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          
      - name: Terraform Init
        run: terraform init
        
      - name: Download Plan Artifact
        uses: actions/download-artifact@v4
        with:
          name: tfplan-prod
          path: envs/prod/
          
      # ここでは tfplan ファイルを引数に渡すため、再度 Plan せずにそのまま Apply される
      - name: Terraform Apply
        run: terraform apply -auto-approve tfplan
