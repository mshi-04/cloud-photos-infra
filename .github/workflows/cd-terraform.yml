name: "Terraform CD (Apply)"

on:
  push:
    branches:
      - main
      - develop
    paths:
      - 'envs/**'
      - 'modules/**'

permissions:
  id-token: write
  contents: read

concurrency:
  group: terraform-cd-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  deploy-dev:
    # dev環境へのデプロイは main と develop ブランチで実行
    uses: ./.github/workflows/reusable-terraform-deploy.yml
    with:
      env_name: dev
      tf_working_dir: envs/dev
      aws_region: ap-northeast-1
      role_plan: arn:aws:iam::${{ vars.AWS_ACCOUNT_ID }}:role/gh-terraform-plan-dev
      role_apply: arn:aws:iam::${{ vars.AWS_ACCOUNT_ID }}:role/gh-terraform-apply-dev
      environment_name: development

  deploy-prod:
    # prod環境へのデプロイは main ブランチのみ実行
    if: github.ref == 'refs/heads/main'
    needs: deploy-dev
    uses: ./.github/workflows/reusable-terraform-deploy.yml
    with:
      env_name: prod
      tf_working_dir: envs/prod
      aws_region: ap-northeast-1
      role_plan: arn:aws:iam::${{ vars.AWS_ACCOUNT_ID }}:role/gh-terraform-plan-prod
      role_apply: arn:aws:iam::${{ vars.AWS_ACCOUNT_ID }}:role/gh-terraform-apply-prod
      environment_name: production
