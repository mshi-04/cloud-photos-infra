name: "Terraform CI (Plan)"

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches:
      - main
    paths:
      - 'envs/**'
      - 'modules/**'
      - '.github/workflows/**'

permissions:
  id-token: write
  contents: read
  pull-requests: write

jobs:
  fmt:
    name: "Format Check"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.14.6"

      - name: Terraform Format
        run: terraform fmt -check -recursive

  plan:
    name: "Plan ${{ matrix.env }}"
    needs: fmt
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - env: dev
            working_dir: envs/dev
            role_suffix: plan-dev
          - env: prod
            working_dir: envs/prod
            role_suffix: plan-prod
    defaults:
      run:
        working-directory: ${{ matrix.working_dir }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ vars.AWS_ACCOUNT_ID }}:role/gh-terraform-${{ matrix.role_suffix }}
          aws-region: ap-northeast-1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: true
          terraform_version: "1.14.6"

      - name: Terraform Init
        id: init
        run: terraform init

      - name: Terraform Validate
        id: validate
        run: terraform validate -no-color

      - name: Terraform Plan
        id: plan
        run: terraform plan -no-color -out=tfplan
        continue-on-error: true

      - name: Comment PR (${{ matrix.env }})
        uses: actions/github-script@v7
        env:
          PLAN: "terraform\n${{ steps.plan.outputs.stdout }}"
          PLAN_STDERR: "${{ steps.plan.outputs.stderr }}"
        with:
          script: |
            const botComment = `<!-- terraform-plan-${{ matrix.env }} -->`;
            const stderr = process.env.PLAN_STDERR ? `\n\n**Stderr:**\n\`\`\`\n${process.env.PLAN_STDERR}\n\`\`\`` : '';
            const output = `#### Terraform ${{ matrix.env }} Plan 📖\`${{ steps.plan.outcome }}\`

            <details><summary>Show Plan</summary>

            \`\`\`\n
            ${process.env.PLAN}
            \`\`\`

            </details>
            ${stderr}
            ${botComment}`;

            // Find existing comment
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              per_page: 100,
            });
            const existingComment = comments.find(
              (c) =>
                c.user?.login === "github-actions[bot]" &&
                typeof c.body === "string" &&
                c.body.includes(botComment)
            );

            if (existingComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existingComment.id,
                body: output
              });
            } else {
              await github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: output
              })
            }

      - name: Check Plan Status
        if: steps.plan.outcome == 'failure'
        run: exit 1
