name: reusable-terraform-deploy

on:
  workflow_call:
    inputs:
      env_name:
        description: "環境名(e.g. dev, prod)。アーティファクト名に使用されます。"
        required: true
        type: string
      tf_working_dir:
        required: true
        type: string
      aws_region:
        required: true
        type: string
      role_plan:
        required: true
        type: string
      role_apply:
        required: true
        type: string
      environment_name:
        description: "手動承認用のGitHub Environment名(e.g. production)。空文字の場合は承認なしで実行されます。"
        required: false
        type: string
        default: ""
      tf_state_bucket:
        description: "Terraform state用S3バケット名"
        required: true
        type: string
      tf_version:
        required: false
        type: string
        default: ""

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  id-token: write
  contents: read

jobs:
  plan:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ inputs.tf_working_dir }}
    steps:
      - uses: actions/checkout@v4

      - name: Read Terraform version
        id: tf_version
        run: |
          TF_VERSION_FILE="$GITHUB_WORKSPACE/.terraform-version"
          if [ ! -f "$TF_VERSION_FILE" ]; then
            echo "::error::.terraform-version file not found at repository root"
            exit 1
          fi
          echo "version=$(cat "$TF_VERSION_FILE")" >> "$GITHUB_OUTPUT"

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false
          terraform_version: ${{ inputs.tf_version || steps.tf_version.outputs.version }}

      - name: Configure AWS (OIDC) - plan role
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ inputs.role_plan }}
          aws-region: ${{ inputs.aws_region }}

      - name: Terraform init
        run: terraform init -backend-config="bucket=${{ inputs.tf_state_bucket }}"

      - name: Terraform plan (save)
        run: terraform plan -no-color -out=tfplan

      - name: Terraform show (summary)
        run: |
          SUMMARY_LINE=$(terraform show -no-color tfplan | grep -E '^(Plan:|No changes\.)' | tail -n 1 || true)
          echo "${SUMMARY_LINE:-Plan summary unavailable.}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "詳細差分は artifact (tfplan-${{ inputs.env_name }}) を参照してください。" >> $GITHUB_STEP_SUMMARY

      - name: Upload plan artifact
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-${{ inputs.env_name }}
          path: |
            ${{ inputs.tf_working_dir }}/tfplan
            .build/
          retention-days: 90
          include-hidden-files: true

  apply:
    runs-on: ubuntu-latest
    needs: plan
    concurrency:
      group: terraform-apply-${{ inputs.env_name }}-${{ inputs.tf_working_dir }}
      cancel-in-progress: false
    # environmentが空文字に評価される場合、承認ゲート（Environment）を使用せずに実行されます
    environment: ${{ inputs.environment_name }}
    defaults:
      run:
        working-directory: ${{ inputs.tf_working_dir }}
    steps:
      - uses: actions/checkout@v4

      - name: Read Terraform version
        id: tf_version
        run: |
          TF_VERSION_FILE="$GITHUB_WORKSPACE/.terraform-version"
          if [ ! -f "$TF_VERSION_FILE" ]; then
            echo "::error::.terraform-version file not found at repository root"
            exit 1
          fi
          echo "version=$(cat "$TF_VERSION_FILE")" >> "$GITHUB_OUTPUT"

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false
          terraform_version: ${{ inputs.tf_version || steps.tf_version.outputs.version }}

      - name: Download plan artifact
        uses: actions/download-artifact@v4
        with:
          name: tfplan-${{ inputs.env_name }}
          path: ${{ github.workspace }}

      - name: Configure AWS (OIDC) - apply role
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ inputs.role_apply }}
          aws-region: ${{ inputs.aws_region }}

      - name: Terraform init
        run: terraform init -backend-config="bucket=${{ inputs.tf_state_bucket }}"

      - name: Terraform apply (from saved plan)
        run: terraform apply ${{ github.workspace }}/${{ inputs.tf_working_dir }}/tfplan